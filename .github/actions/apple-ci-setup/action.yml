name: Apple CI setup
description: Select Xcode, cache XcodeGen/DerivedData, and run xcodegen generate.

inputs:
  derived-data-path:
    description: Path for Xcode DerivedData (shared with xcodebuild -derivedDataPath).
    required: true
  xcode-version:
    description: Xcode version for maxim-lobanov/setup-xcode (default latest-stable).
    required: false
    default: latest-stable

runs:
  using: composite
  steps:
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Show toolchain
      shell: bash
      run: |
        xcodebuild -version
        if command -v xcodegen >/dev/null; then
          xcodegen --version
        fi

    - name: Cache Homebrew downloads
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew
        key: brew-cache-${{ runner.os }}-v2
        restore-keys: brew-cache-${{ runner.os }}-

    - name: Install XcodeGen
      shell: bash
      run: |
        if command -v xcodegen >/dev/null; then
          xcodegen --version
        else
          brew install xcodegen
        fi

    - name: Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ${{ inputs.derived-data-path }}
        key: deriveddata-${{ runner.os }}-${{ inputs.xcode-version }}-${{ hashFiles('project.yml', 'Packages/LogWeightCore/**', 'App/**') }}
        restore-keys: |
          deriveddata-${{ runner.os }}-${{ inputs.xcode-version }}-

    - name: Generate Xcode project
      shell: bash
      run: xcodegen generate
