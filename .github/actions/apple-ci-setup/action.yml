name: Apple CI setup
description: Pin Xcode 16.2, cache XcodeGen/DerivedData, and run xcodegen generate.

inputs:
  derived-data-path:
    description: Path for Xcode DerivedData (shared with xcodebuild -derivedDataPath).
    required: true

runs:
  using: composite
  steps:
    - name: Select Xcode 16.2
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "16.2"

    - name: Show toolchain
      shell: bash
      run: |
        xcodebuild -version
        if command -v xcodegen >/dev/null; then
          xcodegen --version
        fi

    - name: Cache Homebrew downloads
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew
        key: brew-cache-${{ runner.os }}-v2
        restore-keys: brew-cache-${{ runner.os }}-

    - name: Install XcodeGen
      shell: bash
      run: |
        if command -v xcodegen >/dev/null; then
          xcodegen --version
        else
          brew install xcodegen
        fi

    - name: Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ${{ inputs.derived-data-path }}
        key: deriveddata-${{ runner.os }}-xcode-16.2-${{ hashFiles('project.yml', 'Packages/LogWeightCore/**', 'App/**') }}
        restore-keys: |
          deriveddata-${{ runner.os }}-xcode-16.2-

    - name: Generate Xcode project
      shell: bash
      run: xcodegen generate
