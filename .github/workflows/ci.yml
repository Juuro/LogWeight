name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - Config/Version.xcconfig
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-tests:
    name: Core unit tests (swift test)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: swift test
        working-directory: Packages/LogWeightCore
        run: swift test --parallel

  ios-build:
    name: iOS build + UI smoke
    runs-on: macos-latest
    needs: core-tests
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/.ci/DerivedData
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apple CI setup
        uses: ./.github/actions/apple-ci-setup
        with:
          derived-data-path: ${{ env.DERIVED_DATA_PATH }}

      - name: Resolve iOS simulator
        id: sim
        run: |
          UDID=$(python3 .github/scripts/resolve-ios-simulator-udid.py)
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project LogWeight.xcodeproj \
            -scheme LogWeight \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

      # All 13 EntryViewSmokeTests run on every branch. To run a PR subset later, add
      # repeated -only-testing:LogWeightUITests/EntryViewSmokeTests/testMethodName flags.
      - name: Run UI smoke tests
        run: |
          xcodebuild test-without-building \
            -project LogWeight.xcodeproj \
            -scheme LogWeight \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            CODE_SIGNING_ALLOWED=NO

  watch-build:
    name: watchOS build (LogWeightWatch scheme)
    runs-on: macos-latest
    needs: core-tests
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/.ci/DerivedData
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apple CI setup
        uses: ./.github/actions/apple-ci-setup
        with:
          derived-data-path: ${{ env.DERIVED_DATA_PATH }}

      # macos-latest ships newer watch simulator runtimes than Xcode 16.2's SDK expects.
      - name: Download watchOS simulator platform
        run: xcodebuild -downloadPlatform watchOS

      - name: Build for watchOS Simulator
        run: |
          xcodebuild build \
            -project LogWeight.xcodeproj \
            -scheme LogWeightWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO

  bump-build-number:
    name: Bump build number
    runs-on: ubuntu-latest
    needs: [core-tests, ios-build, watch-build]
    if: >-
      success() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'Juuro/LogWeight'
    concurrency:
      group: bump-build-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Skip bump commits
        id: skip
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$HEAD_MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: head commit is a CI bump ([skip ci])."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump CURRENT_PROJECT_VERSION
        if: steps.skip.outputs.skip != 'true'
        id: bump
        run: |
          new="$(Tools/bump-build-number.sh)"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.skip.outputs.skip != 'true'
        env:
          NEW_BUILD: ${{ steps.bump.outputs.new }}
        run: |
          if git diff --quiet -- Config/Version.xcconfig; then
            echo "No change to Config/Version.xcconfig; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Config/Version.xcconfig
          git commit -m "chore(ci): bump build number to ${NEW_BUILD} [skip ci]"
          git push
