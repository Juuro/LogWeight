name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - Config/Version.xcconfig
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-tests:
    name: Core unit tests (swift test)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: swift test
        working-directory: Packages/LogWeightCore
        run: swift test --parallel

  ios-build:
    name: iOS build + UI smoke
    runs-on: macos-14
    needs: core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project LogWeight.xcodeproj \
            -scheme LogWeight \
            -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI smoke tests
        run: |
          xcodebuild test \
            -project LogWeight.xcodeproj \
            -scheme LogWeight \
            -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  watch-build:
    name: watchOS build (LogWeightWatch scheme)
    runs-on: macos-14
    needs: core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for watchOS Simulator
        run: |
          xcodebuild build \
            -project LogWeight.xcodeproj \
            -scheme LogWeightWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  bump-build-number:
    name: Bump build number
    runs-on: ubuntu-latest
    needs: [core-tests, ios-build, watch-build]
    if: >-
      success() &&
      github.event_name == 'push' &&
      github.repository == github.event.repository.full_name
    concurrency:
      group: bump-build-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Skip bump commits
        id: skip
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$HEAD_MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: head commit is a CI bump ([skip ci])."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump CURRENT_PROJECT_VERSION
        if: steps.skip.outputs.skip != 'true'
        id: bump
        run: |
          new="$(Tools/bump-build-number.sh)"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.skip.outputs.skip != 'true'
        env:
          NEW_BUILD: ${{ steps.bump.outputs.new }}
        run: |
          if git diff --quiet -- Config/Version.xcconfig; then
            echo "No change to Config/Version.xcconfig; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Config/Version.xcconfig
          git commit -m "chore(ci): bump build number to ${NEW_BUILD} [skip ci]"
          git push
