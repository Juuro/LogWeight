name: LogWeight
options:
  bundleIdPrefix: de.juuronina
  xcodeVersion: "15.4"
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: "A8L9TRSZCR"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "1"

packages:
  LogWeightCore:
    path: Packages/LogWeightCore

targets:
  LogWeightMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App/macOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/LogWeightMac.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
          - "Resources/Assets.xcassets"
      - path: App/Shared
    resources:
      - path: App/macOS/Resources/PrivacyInfo.xcprivacy
      - path: App/macOS/Resources/Assets.xcassets
    info:
      path: App/macOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: LogWeight
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSHealthShareUsageDescription: LogWeight reads your weight history from Apple Health to show your timeline. Nothing leaves your device.
        NSHealthUpdateUsageDescription: LogWeight saves each weight you enter to Apple Health on this device. Nothing leaves your device.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.juuronina.logweight.mac
        CODE_SIGN_ENTITLEMENTS: App/macOS/Resources/LogWeightMac.entitlements
        INFOPLIST_FILE: App/macOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: YES
    dependencies:
      - package: LogWeightCore
        product: LogWeightCore

  LogWeightWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App/WatchWidget
        excludes:
          - "Resources/Info.plist"
          - "Resources/LogWeightWatchWidget.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
    resources:
      - path: App/WatchWidget/Resources/PrivacyInfo.xcprivacy
    info:
      path: App/WatchWidget/Resources/Info.plist
      properties:
        CFBundleDisplayName: LogWeight
        NSHealthShareUsageDescription: LogWeight reads your latest weight from Apple Health to show it on your watch face. Nothing leaves your device.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.juuronina.logweight.watchkitapp.widget
        CODE_SIGN_ENTITLEMENTS: App/WatchWidget/Resources/LogWeightWatchWidget.entitlements
        INFOPLIST_FILE: App/WatchWidget/Resources/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - package: LogWeightCore
        product: LogWeightCore

  LogWeightWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App/Watch
        excludes:
          - "Resources/Info.plist"
          - "Resources/LogWeightWatch.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
      - path: App/Shared
        excludes:
          - "Views/SettingsView.swift"
    resources:
      - path: App/Watch/Resources/PrivacyInfo.xcprivacy
    info:
      path: App/Watch/Resources/Info.plist
      properties:
        CFBundleDisplayName: LogWeight
        NSHealthShareUsageDescription: LogWeight reads your weight history from Apple Health to show your timeline. Nothing leaves your device.
        NSHealthUpdateUsageDescription: LogWeight saves each weight you enter to Apple Health on this device. Nothing leaves your device.
        WKApplication: true
        WKCompanionAppBundleIdentifier: de.juuronina.logweight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.juuronina.logweight.watchkitapp
        CODE_SIGN_ENTITLEMENTS: App/Watch/Resources/LogWeightWatch.entitlements
        INFOPLIST_FILE: App/Watch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - package: LogWeightCore
        product: LogWeightCore
      - target: LogWeightWatchWidget
        embed: true

  LogWeight:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/LogWeight.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
      - path: App/Shared
    resources:
      - path: App/iOS/Resources/PrivacyInfo.xcprivacy
    info:
      path: App/iOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: LogWeight
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Required by HealthKit before requestAuthorization / save (crash if missing).
        NSHealthShareUsageDescription: LogWeight reads your weight history from Apple Health to show your timeline. Nothing leaves your device.
        NSHealthUpdateUsageDescription: LogWeight saves each weight you enter to Apple Health on this device. Nothing leaves your device.
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.juuronina.logweight
        CODE_SIGN_ENTITLEMENTS: App/iOS/Resources/LogWeight.entitlements
        INFOPLIST_FILE: App/iOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - package: LogWeightCore
        product: LogWeightCore
      - target: LogWeightWatchApp
        embed: true

  LogWeightUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOSUITests
    dependencies:
      - target: LogWeight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.logweight.LogWeightUITests
        TEST_TARGET_NAME: LogWeight

  LogWeightScreenshots:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOSScreenshots
    dependencies:
      - target: LogWeight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.logweight.LogWeightScreenshots
        TEST_TARGET_NAME: LogWeight

schemes:
  LogWeight:
    build:
      targets:
        LogWeight: all
        LogWeightUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LogWeightUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LogWeightWatch:
    build:
      targets:
        LogWeightWatchApp: all
        LogWeightWatchWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LogWeightMac:
    build:
      targets:
        LogWeightMac: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LogWeightScreenshots:
    build:
      targets:
        LogWeight: all
        LogWeightScreenshots: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LogWeightScreenshots
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
