name: LogWeight
options:
  bundleIdPrefix: dev.logweight
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  LogWeightCore:
    path: Packages/LogWeightCore

targets:
  LogWeight:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOS
        excludes:
          - "Resources/Info.plist"
          - "Resources/LogWeight.entitlements"
          - "Resources/PrivacyInfo.xcprivacy"
    resources:
      - path: App/iOS/Resources/PrivacyInfo.xcprivacy
    info:
      path: App/iOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: LogWeight
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.logweight.LogWeight
        CODE_SIGN_ENTITLEMENTS: App/iOS/Resources/LogWeight.entitlements
        INFOPLIST_FILE: App/iOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - package: LogWeightCore
        product: LogWeightCore

  LogWeightUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOSUITests
    dependencies:
      - target: LogWeight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.logweight.LogWeightUITests
        TEST_TARGET_NAME: LogWeight

schemes:
  LogWeight:
    build:
      targets:
        LogWeight: all
        LogWeightUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LogWeightUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
